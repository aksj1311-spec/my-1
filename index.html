<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안수녀님 명언봇</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/DungGeunMo.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="pixel-text">안수녀님 명언봇</h1>
        </header>

        <main>
            <section class="scene">
                <div class="speech-bubble pixel-border" id="speechBubble">
                    <p id="bubbleText">얘들아, 오늘 좀 지각자가 많네요. 마음을 깨끗이.^^ ♥</p>
                </div>
                <div class="field">
                    <div class="nun-character" aria-hidden="true">
                        <div class="halo"></div>
                        <div class="head">
                            <div class="veil"></div>
                            <div class="face">
                                <div class="glasses">
                                    <span></span>
                                    <span></span>
                                </div>
                                <div class="eyes"></div>
                                <div class="mouth"></div>
                            </div>
                        </div>
                        <div class="body">
                            <div class="cross"></div>
                            <div class="arms"></div>
                        </div>
                        <div class="feet"></div>
                    </div>

                    <div class="flowers">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </section>

            <div class="input-section pixel-box">
                <label for="nameInput" class="pixel-text">이름이 뭐니?</label>
                <input type="text" id="nameInput" placeholder="이름을 알려주렴..." maxlength="10">
            </div>

            <button id="quoteBtn" class="pixel-button">수녀님 말씀 듣기</button>


            <!-- 댓글 섹션 추가 -->
            <section class="comment-section">
                <div class="pixel-box comment-info">
                    <p class="pixel-text-small">데이터 찾기 귀찮아서.. 원하는 명언 댓글로 남겨주면 업뎃해드립니다^^...</p>
                </div>
                <div id="commentContainer"></div>
            </section>
        </main>

    </div>

    <script src="main.js"></script>
</body>
</html>
